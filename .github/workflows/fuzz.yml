name: fuzz

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 6" # Saturdays 06:00 UTC

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Fuzz diff parser (30s)
        run: cargo fuzz run diff_parser -- -max_total_time=30
        working-directory: fuzz

      - name: Fuzz diagnostics parser (30s)
        run: cargo fuzz run diagnostics_parser -- -max_total_time=30
        working-directory: fuzz
