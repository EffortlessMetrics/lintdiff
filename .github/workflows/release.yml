name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        env:
          GIT_SHA: ${{ github.sha }}
        run: cargo build --release --target ${{ matrix.target }} -p lintdiff

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../lintdiff-${{ matrix.target }}.tar.gz lintdiff
          cd ../../..
          sha256sum lintdiff-${{ matrix.target }}.tar.gz > lintdiff-${{ matrix.target }}.tar.gz.sha256

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../lintdiff-${{ matrix.target }}.zip lintdiff.exe
          cd ../../..
          sha256sum lintdiff-${{ matrix.target }}.zip > lintdiff-${{ matrix.target }}.zip.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: lintdiff-${{ matrix.target }}
          path: |
            lintdiff-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            lintdiff-*
